- id: linux.ls.human
  title: List files with human sizes
  description: Show a detailed file listing with human-readable sizes.
  command: ls -lah
  tags:
    - linux
    - files
  placeholders: []
  copyable: true
  runnable: true
  notes: Good default listing command for shell sessions.
  shells:
